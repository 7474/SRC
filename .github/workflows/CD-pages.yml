name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  PUBLISH_DIR: SRC.Sharp/SRCTestBlazor/bin/Release/net10.0/publish/wwwroot

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Build project
        run: dotnet publish SRC.Sharp/SRCTestBlazor/SRCTestBlazor.csproj -c Release

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Replace index.html with GitHub Pages version
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: |
          echo "Pages base path: ${BASE_PATH}"
          cp ${{ env.PUBLISH_DIR }}/index.ghp.html ${{ env.PUBLISH_DIR }}/index.html
          sed -i "s|<base href=\"/\" />|<base href=\"${BASE_PATH}/\" />|" ${{ env.PUBLISH_DIR }}/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ env.PUBLISH_DIR }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

