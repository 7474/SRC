updates:
- directory: /SRC.Sharp/
  groups:
    aspnetcore:
      patterns:
      - Microsoft.AspNetCore*
      update-types:
      - minor
      - patch
    selenium:
      patterns:
      - Selenium*
      update-types:
      - minor
      - patch
  package-ecosystem: nuget
  schedule:
    interval: daily
- directory: /SRC.Sharp.Help/HelpConverter/
  package-ecosystem: nuget
  schedule:
    interval: daily
- directory: /SRC.Sharp.Help/
  package-ecosystem: bundler
  schedule:
    interval: daily
- directory: /
  ignore:
  - dependency-name: "github/gh-aw-actions" # Managed by gh aw compile. Version-locked to the gh-aw compiler; do not bump.
  package-ecosystem: github-actions
  schedule:
    interval: daily
version: 2
