version: 2
updates:
- package-ecosystem: nuget
  directory: "/SRC.Sharp/"
  schedule:
    interval: daily
  groups:
    aspnetcore:
      patterns:
      - "Microsoft.AspNetCore*"
      update-types:
      - "minor"
      - "patch"
    selenium:
      patterns:
      - "Selenium*"
      update-types:
      - "minor"
      - "patch"
- package-ecosystem: nuget
  directory: "/SRC.Sharp.Help/HelpConverter/"
  schedule:
    interval: daily
- package-ecosystem: bundler
  directory: "/SRC.Sharp.Help/"
  schedule:
    interval: daily
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "daily"
